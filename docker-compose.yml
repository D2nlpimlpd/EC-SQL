version: "3.8"

services:
  ecsql-app:
    build: .
    container_name: ecsql-app
    ports:
      - "${PORT:-5000}:5000"
    environment:
      EC_SQL_DIALECT: ${EC_SQL_DIALECT:-sqlite}
      DB_PATH: ${DB_PATH:-/data/ecsql/example.sqlite}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-}
      DB_SERVICE_NAME: ${DB_SERVICE_NAME:-}
      ORACLE_CLIENT_DIR: ${ORACLE_CLIENT_DIR:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_API: ${OLLAMA_API:-generate}
      OLLAMA_SQL_MODEL: ${OLLAMA_SQL_MODEL:-qwen3-vl:8b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-qwen3-vl:8b}
      SECRET_KEY: ${SECRET_KEY:-change-me}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${EC_SQL_DATA_DIR:-./data}:/data/ecsql
    restart: unless-stopped
